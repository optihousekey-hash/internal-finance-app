<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Фінансовий облік підприємства</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <header class="page-header">
      <h1>Фінансовий облік</h1>
      <p class="subtitle">Доходи, витрати, аналітика за період і фільтр по категорії</p>
    </header>

    <section class="card">
      <h2>Додати операцію</h2>

      <div class="form-grid">
        <div>
          <label for="date">Дата</label>
          <input type="date" id="date" />
        </div>

        <div>
          <label for="person">Хто заповнив</label>
          <input type="text" id="person" placeholder="Наприклад: Катя" />
        </div>

        <div>
          <label for="type">Тип</label>
          <select id="type">
            <option value="income">Дохід</option>
            <option value="expense">Витрата</option>
          </select>
        </div>

        <div>
          <label for="category">Категорія</label>
          <input type="text" id="category" placeholder="Наприклад: Матеріали" />
        </div>

        <div>
          <label for="amount">Сума</label>
          <input type="number" id="amount" step="0.01" placeholder="0.00" />
        </div>

        <div>
          <label for="comment">Коментар</label>
          <input type="text" id="comment" placeholder="Короткий опис" />
        </div>
      </div>

      <div class="actions">
        <button id="addBtn">Зберегти операцію</button>
      </div>

      <div id="formMessage" class="message"></div>
    </section>

    <section class="card">
      <h2>Фільтри та аналітика</h2>

      <div class="filters-grid">
        <div>
          <label for="dateFrom">Період від</label>
          <input type="date" id="dateFrom" />
        </div>

        <div>
          <label for="dateTo">Період до</label>
          <input type="date" id="dateTo" />
        </div>

        <div>
          <label for="categoryFilter">Категорія</label>
          <select id="categoryFilter">
            <option value="">Усі категорії</option>
          </select>
        </div>

        <div>
          <label for="typeFilter">Тип</label>
          <select id="typeFilter">
            <option value="">Усе</option>
            <option value="income">Тільки доходи</option>
            <option value="expense">Тільки витрати</option>
          </select>
        </div>
      </div>

      <div class="actions">
        <button id="applyFiltersBtn">Показати</button>
        <button id="resetFiltersBtn" class="secondary">Скинути</button>
        <button id="reloadBtn" class="secondary">Оновити дані</button>
      </div>

      <div class="summary-grid">
        <div class="summary-box income-box">
          <div class="summary-title">Доходи за період</div>
          <div class="summary-value" id="summaryIncome">0.00</div>
        </div>

        <div class="summary-box expense-box">
          <div class="summary-title">Витрати за період</div>
          <div class="summary-value" id="summaryExpense">0.00</div>
        </div>

        <div class="summary-box balance-box">
          <div class="summary-title">Баланс за період</div>
          <div class="summary-value" id="summaryBalance">0.00</div>
        </div>
      </div>

      <div class="split-grid">
        <div class="mini-card">
          <h3>Окремо: доходи</h3>
          <div id="incomeList" class="mini-list"></div>
        </div>
        <div class="mini-card">
          <h3>Окремо: витрати</h3>
          <div id="expenseList" class="mini-list"></div>
        </div>
      </div>
    </section>

    <section class="card">
      <h2>Операції</h2>

      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Дата</th>
              <th>Хто</th>
              <th>Тип</th>
              <th>Категорія</th>
              <th>Сума</th>
              <th>Коментар</th>
              <th>Дія</th>
            </tr>
          </thead>
          <tbody id="transactionsBody"></tbody>
        </table>
      </div>
    </section>
  </div>

  <script src="app.js"></script>
</body>
</html>
